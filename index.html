    <!-- Twitter -->

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Structured Data for Search Results -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "PreoCryptoFX",
      "url": "https://preocryptofx.com/",
      "logo": "https://preocryptofx.com/favicon.svg",
      "description": "Professional AI-powered cryptocurrency trading platform.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://preocryptofx.com/trade?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "PreoCryptoFX",
      "url": "https://preocryptofx.com/",
      "logo": "https://preocryptofx.com/favicon.svg",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "email": "support@preocryptofx.com"
      }
    }
    </script>
    <!-- Build ID: 20260413-0820 -->
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('preocrypto_theme');
          var supportDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (theme === 'dark' || (!theme && supportDarkMode)) {
            document.documentElement.classList.add('dark');
          } else if (theme === 'light') {
            document.documentElement.classList.remove('dark');
          } else {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
